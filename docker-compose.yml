name: dizzaract

x-app-env: &app-env
  DATABASE_URL: postgresql+asyncpg://chat:chat@postgres:5432/chat
  REDIS_URL: redis://redis:6379/0
  JWT_SECRET: ${JWT_SECRET:-dev-only-secret-change-me}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:8000}

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: chat
      POSTGRES_PASSWORD: chat
      POSTGRES_DB: chat
    ports:
      # Published on 5433 to avoid clashing with a Postgres already on the host's 5432.
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chat"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  # One-shot: applies migrations, then exits. API replicas wait for it to succeed.
  migrate:
    build: .
    command: ["alembic", "upgrade", "head"]
    environment: *app-env
    depends_on:
      postgres:
        condition: service_healthy

  # Two API replicas to prove Redis fan-out works across instances.
  api1:
    build: .
    environment: *app-env
    ports:
      - "8001:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  api2:
    build: .
    environment: *app-env
    ports:
      - "8002:8000"
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

volumes:
  pgdata:
